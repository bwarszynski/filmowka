<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koło Fortuny - Spotkanie Filmowe</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; }
        h1 { color: #4cd137; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        #canvas-container { position: relative; display: inline-block; margin-top: 20px; }
        canvas { border: 6px solid #fff; border-radius: 50%; background: #262626; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 35px solid #ff4757; z-index: 10;
        }
        button { padding: 14px 28px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; background: #4cd137; border: none; color: white; border-radius: 25px; box-shadow: 0 4px 10px rgba(76,209,55,0.4); transition: all 0.2s; }
        button:hover { background: #44bd32; transform: translateY(-2px); }
        button:disabled { background: #555; box-shadow: none; cursor: not-allowed; transform: none; }
        #result { font-size: 26px; margin-top: 25px; font-weight: bold; color: #4cd137; min-height: 35px; }
        #secret-iframe { display: none; }
    </style>
</head>
<body>

    <h1>Spotkanie Filmowe</h1>
    <div id="result"></div>
    
    <div id="canvas-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>
    <br>
    <button id="spin-btn" onclick="spinWheel()" disabled>Ładowanie filmów...</button>

    <iframe id="secret-iframe" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ6ok4kX69P2VGaXWEB7-6ghysNsuW9rRtsH82gRy_Zlsjid3whCh_jlw5HSiyvxKgOBR4xU7hDka9/pubhtml?gid=0&single=true" onload="processIframeData()"></iframe>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        let options = [];
        let currentRotation = 0;
        let isSpinning = false;
        const colors = ['#1e90ff', '#ffa500', '#2ed573', '#1abc9c', '#9b59b6', '#ff4757'];

        function processIframeData() {
            try {
                const iframe = document.getElementById('secret-iframe');
                // Pobieramy zawartość wyrenderowanej przez Google tabeli
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                
                // Szukamy wszystkich komórek w pierwszej kolumnie tabeli Google
                const rows = iframeDoc.querySelectorAll('table tbody tr');
                const tempOptions = [];

                rows.forEach(row => {
                    // Pierwsza komórka z danymi (zazwyczaj druga w strukturze po indeksie wiersza th/td)
                    const cells = row.querySelectorAll('td');
                    if (cells.length > 0) {
                        const firstCellText = cells[0].innerText || cells[0].textContent;
                        if (firstCellText) {
                            tempOptions.push(firstCellText.trim());
                        }
                    }
                });

                // Czyszczenie nagłówków i spięcie z kołem
                options = tempOptions.filter(item => {
                    const val = item.toUpperCase();
                    return item.length > 0 && val !== 'FILM' && val !== 'FILMDATA';
                });

                if (options.length > 0) {
                    document.getElementById('spin-btn').innerText = 'Losuj film!';
                    document.getElementById('spin-btn').disabled = false;
                    drawWheel();
                } else {
                    // fallback jeśli iframe ma puste selektory, wyciągamy po prostu unikalne teksty td
                    const allCells = iframeDoc.querySelectorAll('td');
                    const textList = Array.from(allCells).map(c => (c.innerText || '').trim());
                    options = textList.filter((item, index) => {
                        const val = item.toUpperCase();
                        return item.length > 2 && val !== 'FILM' && !val.includes('PARYSKA') && !val.includes('YYYY-MM-DD') && textList.indexOf(item) === index;
                    });
                    
                    if (options.length > 0) {
                        document.getElementById('spin-btn').innerText = 'Losuj film!';
                        document.getElementById('spin-btn').disabled = false;
                        drawWheel();
                    } else {
                        document.getElementById('spin-btn').innerText = 'Brak danych do wczytania';
                    }
                }
            } catch (e) {
                // Jeśli bezpieczeństwo przeglądarki zablokuje głęboki dostęp do iframe, używamy ostatecznego parsowania tekstu z pobrania bezpośredniego
                console.log("Iframe fallback");
                fallbackFetch();
            }
        }

        async function fallbackFetch() {
            // Ostateczny, uproszczony i alternatywny link bez parametrów API, czysty plik wyjściowy
            const fallbackUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ6ok4kX69P2VGaXWEB7-6ghysNsuW9rRtsH82gRy_Zlsjid3whCh_jlw5HSiyvxKgOBR4xU7hDka9/pub?output=csv';
            try {
                const res = await fetch(fallbackUrl);
                const text = await res.text();
                const lines = text.split(/\r?\n/);
                options = lines.map(l => {
                    const c = l.split(',');
                    return c[0].replace(/"/g, '').trim();
                }).filter(item => item.length > 0 && item.toUpperCase() !== 'FILM');

                if (options.length > 0) {
                    document.getElementById('spin-btn').innerText = 'Losuj film!';
                    document.getElementById('spin-btn').disabled = false;
                    drawWheel();
                }
            } catch(err) {
                document.getElementById('spin-btn').innerText = 'Wymagany odśwież (Ctrl+F5)';
            }
        }

        function drawWheel() {
            const numOptions = options.length;
            const arcSize = (2 * Math.PI) / numOptions;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            options.forEach((option, i) => {
                const angle = i * arcSize + currentRotation;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arcSize);
                ctx.lineTo(250, 250);
                ctx.fill();
                ctx.stroke();
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 10px Arial";
                ctx.fillText(option.substring(0, 26), 230, 5);
                ctx.restore();
            });
        }

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('result').innerText = '';
            const spinAngle = Math.random() * 1000 + 3000;
            const duration = 5000;
            const start = performance.now();
            function animate(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 4);
                currentRotation = (easeOut * spinAngle) * (Math.PI / 180);
                drawWheel();
                if (progress < 1) { requestAnimationFrame(animate); } 
                else {
                    isSpinning = false;
                    document.getElementById('spin-btn').disabled = false;
                    calculateWinner();
                }
            }
            requestAnimationFrame(animate);
        }

        function calculateWinner() {
            const numOptions = options.length;
            let degrees = (currentRotation * 180 / Math.PI) % 360;
            let index = Math.floor(((360 - degrees + 270) % 360) / (360 / numOptions));
            document.getElementById('result').innerText = `Wybrany film: ${options[index]}`;
        }
    </script>
</body>
</html>
