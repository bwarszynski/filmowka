<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmy z Iguaną</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; }
        h1 { color: #4cd137; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        #canvas-container { position: relative; display: inline-block; margin-top: 20px; }
        canvas { border: 6px solid #fff; border-radius: 50%; background: #262626; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 35px solid #ff4757; z-index: 10;
        }
        button { padding: 14px 28px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; background: #4cd137; border: none; color: white; border-radius: 25px; box-shadow: 0 4px 10px rgba(76,209,55,0.4); transition: all 0.2s; }
        button:hover { background: #44bd32; transform: translateY(-2px); }
        button:disabled { background: #555; box-shadow: none; cursor: not-allowed; transform: none; }
        #result { font-size: 26px; margin-top: 25px; font-weight: bold; color: #4cd137; min-height: 35px; }
        #error-box { display: none; max-width: 600px; margin: 30px auto; padding: 20px; background: #ff4757; color: #fff; border-radius: 8px; text-align: left; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Jaki film Iga?</h1>
    <div id="result"></div>
    
    <div id="canvas-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>
    <br>
    <button id="spin-btn" onclick="spinWheel()" disabled>Ładowanie filmów</button>

    <div id="error-box">
        <h3>Nie można pobrać danych</h3>
        <div id="error-details"></div>
    </div>

    <script>
        // ID arkusza z filmami
        const SHEET_ID = '1Jl8TK98sc7gTNH86Cibx30y22c0hYrps2Z2qroLhwmo'; 
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?output=csv`;

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        let options = [];
        let currentRotation = 0;
        let isSpinning = false;
        const colors = ['#1e90ff', '#ffa500', '#2ed573', '#1abc9c', '#9b59b6', '#ff4757'];

        // Parsowanie cudzysłowiów i innych chujów mujów
        function parseCSV(text) {
            let p = '', q = false;
            let rows = [[]];
            for (let i = 0; i < text.length; i++) {
                let char = text[i]; let next = text[i+1];
                if (char === '"') {
                    if (q && next === '"') { p += '"'; i++; } else { q = !q; }
                } else if (char === ',' && !q) {
                    rows[rows.length - 1].push(p); p = '';
                } else if ((char === '\r' || char === '\n') && !q) {
                    if (char === '\r' && next === '\n') { i++; }
                    rows[rows.length - 1].push(p); p = ''; rows.push([]);
                } else { p += char; }
            }
            if (p || text[text.length - 1] === ',') { rows[rows.length - 1].push(p); }
            return rows.filter(row => row.length > 0 && row[0].trim() !== '');
        }

        async function loadSheetData() {
            try {
                // Aktualizacja listy
                const response = await fetch(`${url}&t=${new Date().getTime()}`);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const rawText = await response.text();
                
                if (rawText.trim().startsWith('<!DOCTYPE html>')) {
                    throw new Error("Google zwróciło HTML zamiast CSV. W arkuszu kliknij 'Plik -> Udostępnij -> Opublikuj w sieci'");
                }

                const parsedRows = parseCSV(rawText);
                
                // Parsowanie nagłówków
                options = parsedRows.map(row => row[0].trim())
                                    .filter(item => item.length > 0 && item.toUpperCase() !== 'FILM' && item.toUpperCase() !== 'FILMDATA');

                if(options.length > 0) {
                    document.getElementById('spin-btn').innerText = 'Losuj!';
                    document.getElementById('spin-btn').disabled = false;
                    drawWheel();
                } else {
                    throw new Error("kolumna pusta");
                }
            } catch (error) {
                console.error(error);
                document.getElementById('spin-btn').innerText = 'Błąd';
                document.getElementById('error-box').style.display = 'block';
                document.getElementById('error-details').innerText = error.message + '\n\nPrzypomnienie: Skrypt musi działać w środowisku HTTPS bo bezpośrednio z dysku rzuci błędem CORS.';
            }
        }

        function drawWheel() {
            const numOptions = options.length;
            const arcSize = (2 * Math.PI) / numOptions;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            options.forEach((option, i) => {
                const angle = i * arcSize + currentRotation;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arcSize);
                ctx.lineTo(250, 250);
                ctx.fill();
                ctx.stroke();
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 9px Arial"; // Rozmiar dopasowany pod dużą liczbę filmów, mozna zmniejszyc
                ctx.fillText(option.substring(0, 24), 230, 4);
                ctx.restore();
            });
        }

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('result').innerText = '';
            const spinAngle = Math.random() * 1000 + 3000;
            const duration = 5000;
            const start = performance.now();
            function animate(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 4);
                currentRotation = (easeOut * spinAngle) * (Math.PI / 180);
                drawWheel();
                if (progress < 1) { requestAnimationFrame(animate); } 
                else {
                    isSpinning = false;
                    document.getElementById('spin-btn').disabled = false;
                    calculateWinner();
                }
            }
            requestAnimationFrame(animate);
        }

        function calculateWinner() {
            const numOptions = options.length;
            let degrees = (currentRotation * 180 / Math.PI) % 360;
            let index = Math.floor(((360 - degrees + 270) % 360) / (360 / numOptions));
            document.getElementById('result').innerText = `Oglądamy: ${options[index]}`;
        }

        loadSheetData();
    </script>
</body>
</html>
